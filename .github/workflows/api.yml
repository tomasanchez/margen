# Margen API CI/CD (FastAPI backend, apps/api).
# Workflow-level path filter: GitHub Actions `paths:` is per-workflow, not per-job,
# so this file only runs when apps/api, the deploy config, or this workflow changes.
#
# The deploy job lives in THIS file (not a separate workflow) on purpose: a job
# `needs:` dependency can only reference jobs in the same workflow. The alternative
# (a standalone deploy workflow keyed on `workflow_run`) runs the deploy logic from
# the DEFAULT branch's copy and gates on the whole prior run rather than specific
# jobs — more indirection for no benefit here. Co-locating keeps the gate explicit:
# deploy `needs: [build, integration]`, so a red lint/coverage/integration run can
# never trigger a Render deploy. See ADR-099 (Render deploy target) and ADR-010.

name: API

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/api/**'
      - '.github/workflows/api.yml'
      # Deploy config: a render.yaml/DEPLOY.md change should re-run CI and (on main)
      # re-fire the deploy hook so the live service picks up Blueprint changes.
      - 'render.yaml'
      - 'DEPLOY.md'
  pull_request:
    branches: [ '**' ]
    paths:
      - 'apps/api/**'
      - '.github/workflows/api.yml'
      - 'render.yaml'
      - 'DEPLOY.md'

permissions:
  contents: read

# One in-flight run per branch. Overlapping pushes to the same ref queue rather
# than running concurrently, so two near-simultaneous pushes to main can't both
# fire the Render deploy hook and stack redundant rebuilds. `cancel-in-progress:
# false` lets the active run (which may already be mid-deploy) finish instead of
# being killed; the newer push waits and then deploys the latest commit.
concurrency:
  group: api-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Install, lint/type-check, ADR registry check, coverage gate, image build.
  build:
    name: Build & coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install dependencies
        run: make dev
      # Fail the build on any known advisory in the locked dependency tree so a
      # vulnerable package can't reach main (backend parity with the Web npm-audit
      # gate). pip-audit has no severity threshold; suppress an accepted advisory
      # with `--ignore-vuln <ID>` if one ever lacks a fix.
      - name: Audit dependencies (pip-audit)
        run: |
          uv export --format requirements-txt --no-emit-project --no-hashes -o requirements-audit.txt
          uvx pip-audit -r requirements-audit.txt
      - name: Lint and type-check
        run: make lint
      - name: ADR registry check
        run: make adr-check
      - name: Test with coverage gate
        run: make cover
      # docker build needs an explicit context path; working-directory does not
      # apply to the build context, so we point at apps/api from the repo root.
      - name: Build image
        run: docker build apps/api --file apps/api/Dockerfile --tag margen-api:${{ github.sha }}
        working-directory: ${{ github.workspace }}

  # Integration tier: real PostgreSQL (pgvector) + migrations + integration tests.
  integration:
    name: Integration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: margen-api
          POSTGRES_PASSWORD: margen-api
          # A dedicated test database — the integration tier creates + DROPS the
          # schema, and the conftest guard refuses any DB name without "test".
          POSTGRES_DB: margen-api-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U margen-api -d margen-api-test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://margen-api:margen-api@localhost:5432/margen-api-test
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install dependencies
        run: make dev
      - name: Apply migrations
        run: uv run alembic upgrade head
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
      # The real-decode guard (tests/integration/test_invoice_parser_real.py)
      # exercises pyzbar against a generated QR PDF, which needs the native zbar
      # shared library (#26). The fast tiers mock this boundary; only here is it real.
      - name: Install native zbar (QR decode)
        run: sudo apt-get update && sudo apt-get install -y libzbar0
      - name: Run the PostgreSQL integration tier
        run: make integration

  # Apply Alembic migrations to Supabase — schema-before-code, so the live
  # database is migrated to `head` BEFORE the Render deploy rebuilds the image.
  # Ordering matters: the new image expects the new schema, so migrate must run
  # (and succeed) first; `deploy` declares `needs: [..., migrate]` to enforce it.
  # Running migrations from CI (rather than `make migrate` by hand) is the
  # migrations-automation decision recorded in the new ADR (auto-migrate-in-CI);
  # it amends the manual-migration note in ADR-099 and rides on the same CI gate
  # as deploy (ADR-010): a red build/integration/migrate run never deploys.
  #
  # Same gate as deploy: `needs: [build, integration]` + push-to-main only, so a
  # red lint/coverage/integration run skips this job and never touches the DB,
  # and PRs/forks never migrate.
  #
  # Inert without access: the Supabase connection string is a repo secret. Forks
  # and pushes before the secret is set hit the no-op skip path (mirrors the
  # deploy job below), so CI stays green for them.
  #
  # Supabase connection caveat: `DATABASE_URL` here MUST be the Supabase
  # direct/session-mode connection string (port 5432), NOT the transaction
  # pooler (port 6543). The transaction pooler (PgBouncer in transaction mode)
  # does not support the prepared statements / session state that Alembic's DDL
  # and migration transactions rely on, so DDL can fail or misbehave on 6543.
  # Use the direct/session connection for migrations; the runtime app may use the
  # pooler. See DEPLOY.md and ADR-099.
  migrate:
    name: Apply migrations (Supabase)
    runs-on: ubuntu-latest
    # The `SUPABASE_DATABASE_URL` secret is an ENVIRONMENT secret on the `prod`
    # environment, so this job must target that environment to read it (a job
    # with `environment:` can read both the environment's secrets AND repo
    # secrets). Add a required-reviewer rule on the `prod` environment to gate
    # production migrations behind a manual approval. ADR-099 / ADR-118.
    environment: prod
    needs: [ build, integration ]
    defaults:
      run:
        working-directory: apps/api
    # Push-to-main only. PRs run build+integration but never migrate.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install dependencies
        run: make dev

      # `secrets` can't be referenced in a step-level `if:`, so map the URL into
      # env and emit a `configured` output. The connection string embeds a
      # password and is never echoed — only checked for emptiness.
      - name: Check configuration
        id: check
        env:
          SUPABASE_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
        run: |
          if [ -n "$SUPABASE_DATABASE_URL" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      # No-op path: inert until the secret is set.
      - name: Skip (not configured)
        if: steps.check.outputs.configured != 'true'
        run: |
          echo "Supabase migration target not configured (set the SUPABASE_DATABASE_URL repo secret to the Supabase direct/session-mode connection string, postgresql+asyncpg://...:5432/postgres); skipping migrations."

      # Apply migrations. Alembic's migrations/env.py resolves the target solely
      # from DatabaseSettings().URL, i.e. the DATABASE_URL env var — no other app
      # settings are needed, so this single secret is sufficient. The URL is
      # passed via env, never interpolated onto the command line where it could
      # be logged.
      - name: Apply migrations (alembic upgrade head)
        if: steps.check.outputs.configured == 'true'
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
        run: |
          uv run alembic upgrade head
          echo "Supabase migrations applied (upgrade head)."

  # Deploy to Render by triggering its Deploy Hook — ONLY after build (lint +
  # coverage), integration, AND migrate all pass, and ONLY on a push to the
  # default branch. `needs: [build, integration, migrate]` is the gate: if any
  # fails, this job is skipped and no deploy fires, so broken code never reaches
  # the live service and the deploy never beats its schema migration.
  #
  # `migrate` is added to `needs` so the Render rebuild fires only AFTER the
  # Supabase schema is at `head` (schema-before-code). When the SUPABASE_DATABASE_URL
  # secret is unset, `migrate` SKIPS rather than fails — and a skipped `needs`
  # dependency is treated as satisfied (not failed). The `if:` below therefore
  # uses `!failure() && !cancelled()` so deploy still runs when migrate merely
  # skipped, while a genuinely failed migrate (e.g. a bad migration against a
  # configured DB) blocks deploy. The push-to-main check is preserved, so PRs and
  # non-main pushes still never deploy.
  #
  # render.yaml sets `autoDeploy: false`, so Render does NOT redeploy on its own
  # native git push — this hook is the single deploy trigger.
  #
  # Inert without access: the Deploy Hook URL is a repo secret. Forks/contributors
  # without it hit the no-op skip path (mirrors keep-alive.yml / monotributo-capture.yml)
  # so CI still passes green for them. See ADR-099.
  deploy:
    name: Deploy (Render hook)
    runs-on: ubuntu-latest
    needs: [ build, integration, migrate ]
    # Push-to-main only, and only when no upstream job failed/was cancelled. A
    # skipped `migrate` (no secret) leaves !failure() && !cancelled() true, so the
    # no-secret path stays green: build+integration run, migrate+deploy skip.
    if: ${{ always() && !failure() && !cancelled() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    # No checkout / repo contents needed — this job only makes one outbound call.
    permissions: {}
    steps:
      # `secrets` can't be referenced in a step-level `if:`, so map the hook URL
      # into env and emit a `configured` output. The URL embeds a key and is never
      # echoed — only checked for emptiness.
      - name: Check configuration
        id: check
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      # No-op path: inert until the Render service exists and the secret is set.
      - name: Skip (not configured)
        if: steps.check.outputs.configured != 'true'
        run: |
          echo "Render deploy hook not configured (set the RENDER_DEPLOY_HOOK_URL repo secret to the service's Deploy Hook URL); skipping deploy."

      # Fire the Deploy Hook. `-f` makes curl exit non-zero on any HTTP error so a
      # failed trigger fails the job (and surfaces in the run). The URL is passed via
      # env, never interpolated onto the command line where it could be logged.
      - name: Trigger Render deploy
        if: steps.check.outputs.configured == 'true'
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Render deploy triggered."
