# Margen API CI/CD (FastAPI backend, apps/api).
# Workflow-level path filter: GitHub Actions `paths:` is per-workflow, not per-job,
# so this file only runs when apps/api, the deploy config, or this workflow changes.
#
# The deploy job lives in THIS file (not a separate workflow) on purpose: a job
# `needs:` dependency can only reference jobs in the same workflow. The alternative
# (a standalone deploy workflow keyed on `workflow_run`) runs the deploy logic from
# the DEFAULT branch's copy and gates on the whole prior run rather than specific
# jobs — more indirection for no benefit here. Co-locating keeps the gate explicit:
# deploy `needs: [build, integration]`, so a red lint/coverage/integration run can
# never trigger a Render deploy. See ADR-099 (Render deploy target) and ADR-010.

name: API

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/api/**'
      - '.github/workflows/api.yml'
      # Deploy config: a render.yaml/DEPLOY.md change should re-run CI and (on main)
      # re-fire the deploy hook so the live service picks up Blueprint changes.
      - 'render.yaml'
      - 'DEPLOY.md'
  pull_request:
    branches: [ '**' ]
    paths:
      - 'apps/api/**'
      - '.github/workflows/api.yml'
      - 'render.yaml'
      - 'DEPLOY.md'

permissions:
  contents: read

# One in-flight run per branch. Overlapping pushes to the same ref queue rather
# than running concurrently, so two near-simultaneous pushes to main can't both
# fire the Render deploy hook and stack redundant rebuilds. `cancel-in-progress:
# false` lets the active run (which may already be mid-deploy) finish instead of
# being killed; the newer push waits and then deploys the latest commit.
concurrency:
  group: api-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Install, lint/type-check, ADR registry check, coverage gate, image build.
  build:
    name: Build & coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install dependencies
        run: make dev
      # Fail the build on any known advisory in the locked dependency tree so a
      # vulnerable package can't reach main (backend parity with the Web npm-audit
      # gate). pip-audit has no severity threshold; suppress an accepted advisory
      # with `--ignore-vuln <ID>` if one ever lacks a fix.
      - name: Audit dependencies (pip-audit)
        run: |
          uv export --format requirements-txt --no-emit-project --no-hashes -o requirements-audit.txt
          uvx pip-audit -r requirements-audit.txt
      - name: Lint and type-check
        run: make lint
      - name: ADR registry check
        run: make adr-check
      - name: Test with coverage gate
        run: make cover
      # docker build needs an explicit context path; working-directory does not
      # apply to the build context, so we point at apps/api from the repo root.
      - name: Build image
        run: docker build apps/api --file apps/api/Dockerfile --tag margen-api:${{ github.sha }}
        working-directory: ${{ github.workspace }}

  # Integration tier: real PostgreSQL (pgvector) + migrations + integration tests.
  integration:
    name: Integration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: margen-api
          POSTGRES_PASSWORD: margen-api
          # A dedicated test database — the integration tier creates + DROPS the
          # schema, and the conftest guard refuses any DB name without "test".
          POSTGRES_DB: margen-api-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U margen-api -d margen-api-test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://margen-api:margen-api@localhost:5432/margen-api-test
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install dependencies
        run: make dev
      - name: Apply migrations
        run: uv run alembic upgrade head
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
      # The real-decode guard (tests/integration/test_invoice_parser_real.py)
      # exercises pyzbar against a generated QR PDF, which needs the native zbar
      # shared library (#26). The fast tiers mock this boundary; only here is it real.
      - name: Install native zbar (QR decode)
        run: sudo apt-get update && sudo apt-get install -y libzbar0
      - name: Run the PostgreSQL integration tier
        run: make integration

  # Deploy to Render by triggering its Deploy Hook — ONLY after build (lint +
  # coverage) AND integration both pass, and ONLY on a push to the default branch.
  # `needs: [build, integration]` is the gate: if either fails, this job is skipped
  # and no deploy fires, so broken code never reaches the live service.
  #
  # render.yaml sets `autoDeploy: false`, so Render does NOT redeploy on its own
  # native git push — this hook is the single deploy trigger.
  #
  # Inert without access: the Deploy Hook URL is a repo secret. Forks/contributors
  # without it hit the no-op skip path (mirrors keep-alive.yml / monotributo-capture.yml)
  # so CI still passes green for them. See ADR-099.
  deploy:
    name: Deploy (Render hook)
    runs-on: ubuntu-latest
    needs: [ build, integration ]
    # Push-to-main only. PRs run build+integration but never deploy.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # No checkout / repo contents needed — this job only makes one outbound call.
    permissions: {}
    steps:
      # `secrets` can't be referenced in a step-level `if:`, so map the hook URL
      # into env and emit a `configured` output. The URL embeds a key and is never
      # echoed — only checked for emptiness.
      - name: Check configuration
        id: check
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      # No-op path: inert until the Render service exists and the secret is set.
      - name: Skip (not configured)
        if: steps.check.outputs.configured != 'true'
        run: |
          echo "Render deploy hook not configured (set the RENDER_DEPLOY_HOOK_URL repo secret to the service's Deploy Hook URL); skipping deploy."

      # Fire the Deploy Hook. `-f` makes curl exit non-zero on any HTTP error so a
      # failed trigger fails the job (and surfaces in the run). The URL is passed via
      # env, never interpolated onto the command line where it could be logged.
      - name: Trigger Render deploy
        if: steps.check.outputs.configured == 'true'
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Render deploy triggered."
