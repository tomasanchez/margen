# Margen Web CI (Vite React frontend, apps/web).
# Workflow-level path filter: GitHub Actions `paths:` is per-workflow, not per-job,
# so this file only runs when apps/web or this workflow itself changes.

name: Web

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/web/**'
      - '.github/workflows/web.yml'
  pull_request:
    branches: [ '**' ]
    paths:
      - 'apps/web/**'
      - '.github/workflows/web.yml'

permissions:
  contents: read

jobs:
  # Install, lint, type-check + build, unit tests.
  build:
    name: Build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v5
      # Provision pnpm honoring the `packageManager` field in apps/web/package.json
      # (pnpm 10.12.4). Must run before setup-node so the pnpm cache can be wired up.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: apps/web/package.json
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # Fail the build on high/critical dependency advisories so a vulnerable
      # package can't reach main. Moderate/low are not gated to avoid noise from
      # transitive dev deps; tighten to --audit-level moderate if desired.
      # The esbuild override (pnpm.overrides in package.json, see ADR-022/ADR-039)
      # is the load-bearing remediation that keeps this gate at 0 high.
      - name: Audit dependencies (high+)
        run: pnpm audit --audit-level high
      - name: Lint
        run: pnpm run lint
      - name: Build
        run: pnpm run build
      - name: Test
        run: pnpm test
