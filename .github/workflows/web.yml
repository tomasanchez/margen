# Margen Web CI (Vite React frontend, apps/web).
# Workflow-level path filter: GitHub Actions `paths:` is per-workflow, not per-job,
# so this file only runs when apps/web or this workflow itself changes.

name: Web

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/web/**'
      - '.github/workflows/web.yml'
  pull_request:
    branches: [ '**' ]
    paths:
      - 'apps/web/**'
      - '.github/workflows/web.yml'

permissions:
  contents: read

jobs:
  # Install, lint, type-check + build, unit tests.
  build:
    name: Build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
